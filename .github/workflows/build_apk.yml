name: Build SOAR APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      # Applicato a ogni invocazione di pip, inclusa la venv creata da p4a.
      # constraints.txt forza pip<24.2 ovunque, blindando il fix.
      PIP_CONSTRAINT: ${{ github.workspace }}/constraints.txt

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11.9
      uses: actions/setup-python@v5
      with:
        # Pin exact patch version. '3.11' resolves to latest (currently 3.11.15)
        # which ships a broken pip vendor tree (resolvelib ImportError on venv create).
        # Also matches P4A_python3_VERSION so host and target stay aligned.
        python-version: '3.11.9'

    - name: Cache buildozer global
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ runner.os }}-py3.11.9-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-global-${{ runner.os }}-py3.11.9-

    - name: Cache buildozer local
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-local-${{ runner.os }}-py3.11.9-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-local-${{ runner.os }}-py3.11.9-

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq git zip unzip openjdk-17-jdk
        sudo apt-get install -y -qq autoconf libtool pkg-config
        sudo apt-get install -y -qq zlib1g-dev libncurses5-dev libncursesw5-dev
        sudo apt-get install -y -qq libtinfo5 cmake libffi-dev libssl-dev

    - name: Install Python dependencies
      run: |
        # Pin pip below 24.2 to avoid the resolvelib API churn that broke
        # pip._vendor.resolvelib.structs.RequirementInformation imports.
        # The p4a venv inherits this pip thanks to PIP_CONSTRAINT.
        python -m pip install --upgrade 'pip<24.2' 'setuptools<70' wheel
        pip install cython==0.29.37
        pip install buildozer==1.5.0
        pip install python-for-android==2023.5.21

    - name: Patch buildozer
      run: python3 patch_buildozer.py

    - name: Patch p4a pip auto-upgrade (installed package)
      run: python3 patch_p4a_pip.py

    - name: Setup p4a and patch recipes
      run: |
        P4A_DIR=".buildozer/android/platform/python-for-android"
        mkdir -p "$(dirname $P4A_DIR)"
        if [ ! -d "$P4A_DIR/.git" ]; then
          git clone -b master --single-branch https://github.com/kivy/python-for-android.git "$P4A_DIR"
        fi
        for RECIPE in hostpython3 python3; do
          FILE="$P4A_DIR/pythonforandroid/recipes/$RECIPE/__init__.py"
          if [ -f "$FILE" ]; then
            sed -i 's/version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"3.11.9\"/' "$FILE"
            sed -i "s/version = \'[0-9]*\.[0-9]*\.[0-9]*\'/version = \'3.11.9\'/" "$FILE"
            echo "$RECIPE version after patch:"
            grep "version = " "$FILE" | grep -v "#" | head -1
          fi
        done
        # Patcha anche il clone locale di p4a (usato di fatto dal build)
        python3 patch_p4a_pip.py

    - name: Build APK
      run: buildozer android debug
      env:
        P4A_python3_VERSION: "3.11.9"
        P4A_hostpython3_VERSION: "3.11.9"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: soar-debug-apk
        path: bin/*.apk
        if-no-files-found: error

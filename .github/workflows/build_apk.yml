name: Build SOAR APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permette lancio manuale dal sito GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache buildozer global
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-global-${{ runner.os }}-

    - name: Cache buildozer local
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-local-${{ runner.os }}-

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Install buildozer and p4a
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0
        pip install python-for-android==2023.5.21

    - name: Patch buildozer - remove p4a reclone logic
      run: |
        python3 -c "
        import glob, os

        # Patcha targets/android.py in TUTTI i path possibili
        targets = glob.glob(os.path.expanduser('~/.local/lib/python*/site-packages/buildozer/targets/android.py'))
        targets += glob.glob('/usr/local/lib/python*/site-packages/buildozer/targets/android.py')
        targets += glob.glob('/usr/lib/python*/site-packages/buildozer/targets/android.py')
        import buildozer.targets.android as bta
        targets.insert(0, bta.__file__)

        for f in set(targets):
            if not os.path.exists(f): continue
            txt = open(f).read()
            if 'Detected old url/branch' not in txt: continue
            lines = txt.splitlines(keepends=True)
            new_lines = []
            i = 0
            while i < len(lines):
                line = lines[i]
                if 'Detected old url/branch' in line:
                    indent = len(line) - len(line.lstrip())
                    new_lines.append(' ' * indent + 'pass  # PATCH: skip reclone' + chr(10))
                    i += 1
                    while i < len(lines):
                        nl = lines[i]
                        ns = nl.lstrip()
                        ni = len(nl) - len(ns)
                        if ns and ni <= indent:
                            break
                        i += 1
                    continue
                new_lines.append(line)
                i += 1
            open(f, 'w').write(''.join(new_lines))
            print(f'Patchato: {f}')
        "

    - name: Setup p4a at commit 0daa74c8 (v2023.05.21)
      run: |
        P4A_DIR=".buildozer/android/platform/python-for-android"
        mkdir -p "$(dirname $P4A_DIR)"

        if [ -d "$P4A_DIR/.git" ]; then
          CURRENT=$(cd "$P4A_DIR" && git rev-parse --short HEAD)
          echo "p4a commit attuale: $CURRENT"
        fi

        if [ ! -d "$P4A_DIR/.git" ]; then
          git clone -b master --single-branch \
            https://github.com/kivy/python-for-android.git "$P4A_DIR"
        fi

        # Patcha recipe con sed - metodo piu' affidabile
        for RECIPE in hostpython3 python3; do
          FILE="$P4A_DIR/pythonforandroid/recipes/$RECIPE/__init__.py"
          if [ -f "$FILE" ]; then
            sed -i 's/version = "[0-9]*\.[0-9]*\.[0-9]*"/version = "3.11.9"/' "$FILE"
            sed -i "s/version = '[0-9]*\.[0-9]*\.[0-9]*'/version = '3.11.9'/" "$FILE"
            echo "$RECIPE: $(grep 'version = ' $FILE | grep -v '#' | head -1)"
          fi
        done

    - name: Build APK
      run: |
        buildozer android debug
      env:
        P4A_python3_VERSION: "3.11.9"
        P4A_hostpython3_VERSION: "3.11.9"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: soar-debug-apk
        path: bin/*.apk
        if-no-files-found: error
